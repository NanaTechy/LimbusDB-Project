<h1>EGOs</h1>

<a href="/home">Home</a><br><br>

<table border="1">
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Sinner</th>
    <th>Class</th>
	<th>Season</th>
    <th>Affinities</th>
    <th>Status Effects</th>
    <th>Actions</th>
</tr>

{% for e in egos %}
<tr>
    <td>{{ e.ego_id }}</td>
	<td>
    <a href="/egos/{{ e.ego_id }}">{{ e.ego_name }}</a>
	</td>
    <td>{{ e.sinner }}</td>
	<td>{{ e.class }}</td>
	<td>{{ e.season_released }}</td>
	<td>{{ e.affinities if e.affinities else "None" }}</td>
	<td>{{ e.statuses if e.statuses else "None" }}</td>
    <td>
        <a href="/edit_ego/{{ e.ego_id }}">Edit</a> |
        <a href="/delete_ego/{{ e.ego_id }}"
		onclick="return confirm('Are you sure you want to delete this EGO?');">
		Delete</a>
    </td>
	
</tr>
{% endfor %}
</table>
